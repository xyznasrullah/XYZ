<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasrullah | Profile</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
</head>
<body class="dark-theme">

    <div class="cursor-trail"></div>

    <nav class="top-nav">
        <div class="logo">XYZ</div>
        <div class="nav-right">
            <button id="themeToggle" class="login-btn">🌓 Mode</button>
            <button id="loginBtn" class="login-btn">Login</button>
        </div>
    </nav>

    <div class="container">
    <section class="profile-card">
        <div class="bio">
            <h2>About Me</h2>
            <div id="details-animation" style="min-height: 120px;"></div>
        </div>

        <div class="skills-section">
            <h3>My Mus-Skills</h3>
            <div class="skill-item">
                <span>Gaming</span>
                <div class="progress-bar"><div class="progress" style="width: 50%;"></div></div>
            </div>
            </div>

        <div class="social-links">
            <a href="https://www.facebook.com/yournasrullah" class="btn">Facebook</a>
            <a href="https://github.com/xuznasrullah" class="btn">GitHub</a>
        </div>
    </section>
</div>

    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>
<div id="loginModal" class="modal">
    <div class="modal-content">
        <span class="close-btn">&times;</span>
        <h2>Security Login</h2>
        <p id="errorMsg" class="error-text">Invalid Credentials!</p>
        <input type="text" id="username" placeholder="Username" class="login-input">
        <input type="password" id="password" placeholder="Password" class="login-input">
        <button id="submitLogin" class="modal-login-btn">Authorize</button>
    </div>
</div>

    <script>
        // ১. টাইপিং অ্যানিমেশন
       // ৩. নতুন জাভাস্ক্রিপ্ট অ্যানিমেশন (About Me বক্সের জন্য)
var typed = new Typed('#details-animation', {
    strings: [
        '<span class="info-label">Name:</span> Nasrullah<br>' +
        '<span class="info-label">Academic Status:</span> Student<br>' +
        '<span class="info-label">Age:</span> 20<br>' +
        '<span class="info-label">Vibe:</span> Creative mind, low battery brain 😴'
    ],
    typeSpeed: 40,
    showCursor: true,
    cursorChar: '_',
    loop: false
});

        // ২. লগইন ও মিউজিক চালু (ব্রাউজার পলিসির কারণে ক্লিক করলে মিউজিক বাজবে)
        const music = document.getElementById('bgMusic');
        const loginBtn = document.getElementById('loginBtn');
        const loginModal = document.getElementById('loginModal');

        loginBtn.onclick = () => { 
            loginModal.style.display = 'flex'; 
            music.play(); // লগইন বাটনে ক্লিক করলে গান শুরু হবে
        }

        // ৩. ডার্ক/লাইট মোড টগল
        const themeBtn = document.getElementById('themeToggle');
        themeBtn.onclick = () => {
            document.body.classList.toggle('light-theme');
        }

        // ৪. কাস্টম কার্সর ট্রেইল
        document.addEventListener('mousemove', (e) => {
            const trail = document.querySelector('.cursor-trail');
            trail.style.left = e.pageX + 'px';
            trail.style.top = e.pageY + 'px';
        });

        // ক্লোজ বাটন ফাংশন
        document.querySelector('.close-btn').onclick = () => loginModal.style.display = 'none';
        document.getElementById('submitLogin').onclick = () => document.getElementById('errorMsg').style.visibility = 'visible';
    </script>
</body>
</html>
