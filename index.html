<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamer Profile | My Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <header>
            <h1 class="glitch" data-text="GAMER_NAME">GAMER_NAME</h1>
            <p>Pro Player | Streamer | Content Creator</p>
        </header>

        <section class="profile-card">
            <div class="bio">
                <h2>About Me</h2>
                <p>আসসালামু আলাইকুম! আমি একজন প্যাশনেট গেমার। আমি মূলত FPS এবং RPG গেম খেলতে পছন্দ করি। বর্তমানে আমি আমার স্কিল এবং গেমিং কন্টেন্ট নিয়ে কাজ করছি।</p>
            </div>

            <div class="stats">
                <div class="stat-box"><h3>Rank</h3><p>Elite</p></div>
                <div class="stat-box"><h3>K/D</h3><p>4.5</p></div>
                <div class="stat-box"><h3>Level</h3><p>75</p></div>
            </div>

            <div class="social-links">
                <a href="#" class="btn">Discord</a>
                <a href="#" class="btn">YouTube</a>
                <a href="#" class="btn">Twitch</a>
            </div>
        </section>
    </div>

</body>
</html>
